{% extends 'base.html' %}
{% block content %}
<h2>Cadastro de Produto</h2>
<form method="post" enctype="multipart/form-data" id="idFrmProduto" name="frmProduto">
    {% csrf_token %}
    <div class="mb-3">
        <label for="idTxtCodigo" class="form-label">Código</label>
        <input type="number" class="form-control" id="idTxtCodigo" name="codigo" value="{{ form.codigo.value|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label for="idTxtNome" class="form-label">Nome</label>
        <input type="text" class="form-control" id="idTxtNome" name="nome" value="{{ form.nome.value|default:'' }}" maxlength="70" required>
    </div>
    <div class="mb-3">
        <label for="idNumPrecoCompra" class="form-label">Preço de compra</label>
        <input type="number" step="0.01" class="form-control" id="idNumPrecoCompra" name="preco_compra" value="{{ form.preco_compra.value|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label for="idNumPrecoVenda" class="form-label">Preço de venda</label>
        <input type="number" step="0.01" class="form-control" id="idNumPrecoVenda" name="preco_venda" value="{{ form.preco_venda.value|default:'' }}" required>
    </div>
    <div class="mb-3">
        <label for="idSelCor" class="form-label">Cor</label>
        <select class="form-select" id="idSelCor" name="cor" required>
            <option value="">Selecione</option>
            {% for value, label in form.cor.field.choices %}
                <option value="{{ value }}" {% if form.cor.value == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="idSelFabricante" class="form-label">Fabricante</label>
        <select class="form-select" id="idSelFabricante" name="fabricante" required>
            <option value="">Selecione</option>
            {% for fab in form.fabricante.field.queryset %}
                <option value="{{ fab.pk }}" {% if form.fabricante.value == fab.pk %}selected{% endif %}>{{ fab.nome }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label for="idFileImagem" class="form-label">Imagem</label>
        <input type="file" class="form-control" id="idFileImagem" name="imagem" accept="image/*">
    </div>
    <button type="submit" class="btn btn-primary">Cadastrar</button>
    <button type="reset" class="btn btn-secondary" id="idBtnLimpar" name="btnLimpar">Limpar</button>
</form>
{% endblock %}
